{% extends 'shop/besic.html' %}

{% block title %}Checkout{% endblock %}

{% block body %}

<div class="container mt-5">

    <div class="row">

        <!-- LEFT: Billing Details -->
        <div class="col-md-7">
            <div class="card p-4 shadow-lg border-0 rounded-4">
                <h4 class="mb-4">🧾 Billing Details</h4>

                <form method="post" action="{% url 'checkout' %}" id="checkout-form">
                    {% csrf_token %}
                    <input type="hidden" name="items_json" id="items_json">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <input type="text" name="name" class="form-control" placeholder="First Name">
                        </div>
                        <div class="col-md-6 mb-3">
                            <input type="text" name="last_name" class="form-control" placeholder="Last Name">
                        </div>
                    </div>

                    <div class="mb-3">
                        <input type="email" name="email" class="form-control" placeholder="Email Address">
                    </div>

                    <div class="mb-3">
                        <input type="text" name="phone" class="form-control" placeholder="Phone Number">
                    </div>

                    <div class="mb-3">
                        <textarea name="address" class="form-control" rows="3" placeholder="Full Address"></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <input type="text" name="city" class="form-control" placeholder="City">
                        </div>
                        <div class="col-md-6 mb-3">
                            <input type="text" name="zip_code" class="form-control" placeholder="Pincode">
                        </div>
                    </div>

                    <div class="mb-3">
                        <input type="text" name="state" class="form-control" placeholder="State">
                    </div>

                    <button type="submit" class="btn btn-success w-100 mt-3">
                        Proceed to Payment
                    </button>
                </form>
            </div>
        </div>

        <!-- RIGHT: Order Summary -->
        <div class="col-md-5">
            <div class="card p-4 shadow-lg border-0 rounded-4">
                <h4 class="mb-4">🛒 Order Summary</h4>

                <div id="cart-items" class="list-group mb-3"></div>

                <div class="d-flex justify-content-between">
                    <strong>Total:</strong>
                    <strong id="total-price">₹0</strong>
                </div>

                <hr>

                <button type="submit" form="checkout-form" class="btn btn-success w-100 mt-3">
                    Proceed to Payment
                </button>
            </div>
        </div>

    </div>

</div>

{% endblock %}
{% block js %}
{{ block.super }}
<script>

var CART_KEY = "cart_" + (window.username || "guest");
/* ---------- GET / SAVE ---------- */

function getCart(){
    return JSON.parse(localStorage.getItem(CART_KEY) || "{}");
}

function saveCart(cart){
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
}

/* ---------- RENDER ---------- */

function renderCheckout(){
    let cart = getCart();
    let container = document.getElementById("cart-items");
    let totalBox = document.getElementById("total-price");
    let hiddenInput = document.getElementById("items_json");

    let total = 0;
    let html = "";

    if(Object.keys(cart).length === 0){
        container.innerHTML = `<div class="text-center text-muted">Cart is empty</div>`;
        totalBox.innerText = "₹0";
        hiddenInput.value = "{}";
        return;
    }

    Object.keys(cart).forEach(key => {

        let item = cart[key];

        let qty = parseInt(item.qty || 0);
        let price = parseInt(item.price || 0);
        let name = item.name || key;
        let image = item.image || "";
        let url = item.url || "#";

        let lineTotal = qty * price;
        total += lineTotal;

        html += `
        <div class="list-group-item d-flex align-items-center justify-content-between gap-3">

            <div style="display:flex; gap:10px; align-items:center;">
                <img src="${image}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;">

                <div>
                    <div>${name}</div>
                    <small>₹${price} each</small>
                </div>
            </div>

            <div>
                <button class="btn btn-danger btn-sm minus" data-id="${key}">-</button>
                <span>${qty}</span>
                <button class="btn btn-success btn-sm plus" data-id="${key}">+</button>
            </div>

            <div>₹${lineTotal}</div>

        </div>
        `;
    });

    container.innerHTML = html;
    totalBox.innerText = "₹" + total;

    hiddenInput.value = JSON.stringify(cart);
}

/* ---------- BUTTONS ---------- */

document.addEventListener("click", function(e){

    if(e.target.classList.contains("plus")){
        let key = e.target.dataset.id;
        let cart = getCart();

        cart[key].qty += 1;

        saveCart(cart);
        renderCheckout();
    }

    if(e.target.classList.contains("minus")){
        let key = e.target.dataset.id;
        let cart = getCart();

        cart[key].qty -= 1;

        if(cart[key].qty <= 0){
            delete cart[key];
        }

        saveCart(cart);
        renderCheckout();
    }

});

/* ---------- LOAD ---------- */

document.addEventListener("DOMContentLoaded", function(){
    renderCheckout();
});

</script>
{% endblock %}
